<!DOCTYPE html>

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #060a06;
      color: #d1cdc4;
      font-family: 'Cormorant Garamond', serif;
      min-height: 100vh;

      align-items: center;

      padding: 2em;
    }

      font-family: 'Cinzel', serif;

      letter-spacing: 0.2em;
      text-transform: uppercase;
      background: linear-gradient(180deg, #e8d48b 0%, #c9a84c 40%, #8b7a2e 100%);

      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1em;
    }
    h2 {
      font-family: 'Cinzel', serif;
      font-size: 0.75rem;

    }

      font-family: 'Cinzel', serif;
      font-size: 0.7em;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-decoration: none;
      color: #c9a84c;
      border: 1px solid #8b7a2e;
      outline: 1px solid rgba(139, 122, 46, 0.15);
      outline-offset: 3px;
      padding: 0.8em 2.5em;
      transition: all 0.4s ease;
    }
    a:hover {
      border-color: #c9a84c;
      color: #d4bf6a;
