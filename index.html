<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RumInABottle</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0b;
      --bg-card: rgba(255, 255, 255, 0.03);
      --bg-card-hover: rgba(255, 255, 255, 0.06);
      --border: rgba(255, 255, 255, 0.06);
      --border-hover: rgba(255, 255, 255, 0.12);
      --text: #e4e4e7;
      --text-secondary: #71717a;
      --text-muted: #3f3f46;
      --accent: #a78bfa;
      --accent-dim: rgba(167, 139, 250, 0.1);
      --green: #4ade80;
      --green-dim: rgba(74, 222, 128, 0.1);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, sans-serif;
      min-height: 100vh;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* Subtle grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 0;
    }

    /* Gradient glow */
    body::after {
      content: '';
      position: fixed;
      top: -40%;
      left: 50%;
      transform: translateX(-50%);
      width: 80%;
      height: 60%;
      background: radial-gradient(ellipse, rgba(167, 139, 250, 0.04) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .page {
      max-width: 640px;
      margin: 0 auto;
      padding: 6em 2em 4em;
      position: relative;
      z-index: 1;
    }

    /* Header */
    .header {
      margin-bottom: 3em;
    }

    .greeting {
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.8em;
      display: flex;
      align-items: center;
      gap: 0.5em;
    }

    .greeting::before {
      content: '';
      width: 24px;
      height: 1px;
      background: var(--accent);
      opacity: 0.5;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 600;
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin-bottom: 0.5em;
    }

    .bio {
      font-size: 1.1rem;
      color: var(--text-secondary);
      font-weight: 300;
      max-width: 480px;
      line-height: 1.7;
    }

    /* Status indicator */
    .status {
      display: inline-flex;
      align-items: center;
      gap: 0.5em;
      font-size: 0.75rem;
      color: var(--text-secondary);
      margin-top: 1.5em;
      padding: 0.4em 0.8em;
      background: var(--green-dim);
      border: 1px solid rgba(74, 222, 128, 0.1);
      border-radius: 100px;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      background: var(--green);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* Divider */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, var(--border), transparent);
      margin: 2.5em 0;
    }

    /* Section labels */
    .section-label {
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 1em;
    }

    /* Projects / Links */
    .projects {
      display: flex;
      flex-direction: column;
      gap: 0.75em;
      margin-bottom: 2.5em;
    }

    .project-card {
      display: flex;
      align-items: center;
      gap: 1em;
      padding: 1em 1.2em;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      text-decoration: none;
      color: var(--text);
      transition: all 0.25s ease;
    }

    .project-card:hover {
      background: var(--bg-card-hover);
      border-color: var(--border-hover);
      transform: translateY(-1px);
    }

    .project-icon {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--accent-dim);
      border-radius: 8px;
      flex-shrink: 0;
    }

    .project-icon svg {
      width: 18px;
      height: 18px;
      color: var(--accent);
    }

    .project-info {
      flex: 1;
      min-width: 0;
    }

    .project-name {
      font-size: 0.9rem;
      font-weight: 500;
    }

    .project-desc {
      font-size: 0.78rem;
      color: var(--text-secondary);
      margin-top: 0.15em;
    }

    .project-arrow {
      color: var(--text-muted);
      transition: all 0.25s ease;
      flex-shrink: 0;
    }

    .project-arrow svg {
      width: 16px;
      height: 16px;
    }

    .project-card:hover .project-arrow {
      color: var(--text-secondary);
      transform: translateX(2px);
    }

    /* Socials */
    .socials {
      display: flex;
      gap: 0.6em;
      flex-wrap: wrap;
    }

    .social-link {
      display: flex;
      align-items: center;
      gap: 0.5em;
      padding: 0.5em 1em;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      text-decoration: none;
      color: var(--text-secondary);
      font-size: 0.78rem;
      font-weight: 400;
      transition: all 0.25s ease;
    }

    .social-link:hover {
      background: var(--bg-card-hover);
      border-color: var(--border-hover);
      color: var(--text);
    }

    .social-link svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    /* Footer */
    .footer {
      margin-top: 4em;
      padding-top: 2em;
      border-top: 1px solid var(--border);
      font-size: 0.72rem;
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
    }

    /* Animations */
    .fade-in {
      animation: fadeUp 0.5s ease-out both;
    }

    .fade-in:nth-child(1) { animation-delay: 0.05s; }
    .fade-in:nth-child(2) { animation-delay: 0.1s; }
    .fade-in:nth-child(3) { animation-delay: 0.15s; }
    .fade-in:nth-child(4) { animation-delay: 0.2s; }
    .fade-in:nth-child(5) { animation-delay: 0.25s; }
    .fade-in:nth-child(6) { animation-delay: 0.3s; }
    .fade-in:nth-child(7) { animation-delay: 0.35s; }

    @keyframes fadeUp {
      0% { opacity: 0; transform: translateY(10px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }

    @media (max-width: 640px) {
      .page { padding: 4em 1.5em 3em; }
      h1 { font-size: 1.8rem; }
      .socials { gap: 0.5em; }
    }
  </style>
</head>
<body>

</body>
